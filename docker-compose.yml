services:
  tuwunel:
    image: jevolk/tuwunel:latest
    restart: unless-stopped
    labels:
      - "git.sha=${GIT_SHA}"
    volumes:
      - tuwunel-data:/var/lib/tuwunel
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/tuwunel.toml:ro
    environment:
      TUWUNEL_CONFIG: /etc/tuwunel/tuwunel.toml
      # Manual registration enable
      # echo "REGISTRATION_TOKEN=$(head -c 64 /dev/urandom | base64 -w 0)" > /opt/matrix/.env
      # TUWUNEL_REGISTRATION_TOKEN: ${REGISTRATION_TOKEN}
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      GIT_SHA: ${GIT_SHA}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

volumes:
  tuwunel-data:
  caddy-data:
  caddy-config:

networks:
  internal:
