name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p /opt/matrix/caddy /opt/matrix/tuwunel /opt/matrix/coturn"
          scp -i ~/.ssh/deploy_key docker-compose.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/matrix/docker-compose.yml
          scp -i ~/.ssh/deploy_key caddy/Caddyfile \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/matrix/caddy/Caddyfile
          scp -i ~/.ssh/deploy_key tuwunel/tuwunel.toml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/matrix/tuwunel/tuwunel.toml
          scp -i ~/.ssh/deploy_key coturn/turnserver.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/matrix/coturn/turnserver.conf
          scp -i ~/.ssh/deploy_key livekit/livekit.yaml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/matrix/livekit/livekit.yaml

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/matrix && GIT_SHA=${{ github.sha }} docker compose up -d --pull always --remove-orphans"
