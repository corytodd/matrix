services:
  tuwunel:
    image: jevolk/tuwunel@sha256:478eddb7c9a3b551b1519ff9f256dab4ed2067e58b7dd1cd129bbf67df62c1d0
    restart: unless-stopped
    labels:
      - "git.sha=${GIT_SHA}"
    volumes:
      - tuwunel-data:/var/lib/tuwunel
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/tuwunel.toml:ro
    environment:
      TUWUNEL_CONFIG: /etc/tuwunel/tuwunel.toml
      TUWUNEL_TURN_SECRET: ${COTURN_SECRET}
      TUWUNEL_SERVER_NAME: ${TUWUNEL_SERVER_NAME}
      TUWUNEL_TURN_URIS: ${TUWUNEL_TURN_URIS}
      # Manual registration enable
      # echo "REGISTRATION_TOKEN=$(head -c 64 /dev/urandom | base64 -w 0)" > /opt/matrix/.env
      # TUWUNEL_REGISTRATION_TOKEN: ${REGISTRATION_TOKEN}
    networks:
      - internal

  livekit:
    image: livekit/livekit-server@sha256:698a13999b4b2285866a32903724884b1e10c03259526391d9b3a72d9b73bbb4
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml --node-ip=${EXTERNAL_IP}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_KEY}: ${LIVEKIT_SECRET}"

  lk-jwt-service:
    image: ghcr.io/element-hq/lk-jwt-service@sha256:e9174b17c7b0048dba3899e50e2c3a6df8ec97657267a7cefa704076b89d3f96
    restart: unless-stopped
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_KEY: ${LIVEKIT_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${HOST}
    networks:
      - internal

  coturn:
    image: coturn/coturn@sha256:254a7e19f23366bc638af8e092c18ea52e0eefc9e44041f376e58b61b3b6d646
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: >-
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${COTURN_SECRET}
      --external-ip=${EXTERNAL_IP}
      --realm=${COTURN_REALM}

  caddy:
    image: caddy@sha256:1e40b251ca9639ead7b5cd2cedcc8765adfbabb99450fe23f130eefabf50f4bc
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GIT_SHA: ${GIT_SHA}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

volumes:
  tuwunel-data:
  caddy-data:
  caddy-config:

networks:
  internal:
